name: release

# Cut a release by pushing a tag:  git tag v1.1.0 && git push --tags
# goreleaser builds the per-OS/arch adg binaries and publishes them to the
# GitHub Release for the tag. See RELEASING.md for the full flow.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # goreleaser creates the Release and uploads assets via GITHUB_TOKEN

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # goreleaser needs full history + tags
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
